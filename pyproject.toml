[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "audio2ay3"
version = "0.1.0"
description = "Convert instrumental audio into a 50 Hz AY-3-8910 register stream, and emulate YM register streams back to audio."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "numpy>=1.26",
    "numba>=0.59",
]

[project.optional-dependencies]
mp3 = ["lameenc>=1.7"]
audio = ["soundfile>=0.12"]
# Neural analysis stack (default conversion path; heavy, opt-in to install).
# basic-pitch[onnx] pulls onnxruntime so the light, portable ONNX backend is available;
# soundfile decodes the input audio. Demucs (separation) pulls in torch and is the heaviest part.
neural = ["demucs", "basic-pitch[onnx]", "soundfile>=0.12"]
mt3 = ["t5x", "jax", "note-seq"]
dev = ["pytest>=8", "pytest-xdist", "ruff", "mypy"]

[project.scripts]
audio2ay3 = "audio2ay3.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/audio2ay3"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
src = ["src"]
